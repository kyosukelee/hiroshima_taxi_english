<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>広島タクシー会話練習</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ef; --surface:#fff; --surface2:#faf8f5;
  --border:#e8e2d9; --border2:#d4ccbe;
  --en:#e05a2b; --en-light:#fdf0eb; --en-border:rgba(224,90,43,0.28);
  --kr:#3b5bdb; --kr-light:#eef2ff; --kr-border:rgba(59,91,219,0.28);
  --primary:#e05a2b; --primary-light:#fdf0eb; --primary-border:rgba(224,90,43,0.28);
  --accent:#2b7de0; --accent-light:#ebf3fd; --accent-border:rgba(43,125,224,0.25);
  --green:#1a9e5c; --green-light:#e8f7ef; --green-border:rgba(26,158,92,0.25);
  --amber:#d97706; --amber-light:#fef3c7; --amber-border:rgba(217,119,6,0.25);
  --orange:#ea580c; --orange-light:#fff7ed;
  --teal:#0891b2; --teal-light:#ecfeff; --teal-border:rgba(8,145,178,0.25);
  --purple:#7048e8; --purple-light:#f3f0ff; --purple-border:rgba(112,72,232,0.25);
  --text:#1c1917; --text-mid:#57534e; --text-soft:#a8a29e;
  --radius:14px; --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 14px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:54px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:var(--sh);}
.taxi-badge{background:var(--primary);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:1.5px;padding:4px 9px;border-radius:6px;flex-shrink:0;}
.header-text h1{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:var(--text);line-height:1.1;}
.header-text p{font-size:11px;color:var(--text-soft);margin-top:1px;}
#scoreDisplay{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-border);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;flex-shrink:0;}

/* LANG SWITCHER */
.lang-switcher{margin-left:auto;display:flex;gap:4px;flex-shrink:0;}
.lang-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-soft);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.lang-btn:hover{border-color:var(--primary-border);}
.lang-btn.en.active{background:var(--en-light);border-color:var(--en-border);color:var(--en);}
.lang-btn.kr.active{background:var(--kr-light);border-color:var(--kr-border);color:var(--kr);}

/* MODE BAR */
.mode-bar{background:var(--surface);border-bottom:2px solid var(--border);padding:0 14px;display:flex;gap:0;flex-shrink:0;height:40px;align-items:flex-end;}
.mode-btn{padding:0 16px;height:40px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--text-soft);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0;margin-bottom:-2px;}
.mode-btn:hover{color:var(--text-mid);}
.mode-btn.active{color:var(--primary);border-bottom-color:var(--primary);}

/* SCENARIO TABS */
.scenario-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:0 10px;display:flex;gap:3px;overflow-x:auto;flex-shrink:0;height:42px;align-items:center;scrollbar-width:none;}
.scenario-bar::-webkit-scrollbar{display:none;}
.sc-btn{white-space:nowrap;padding:4px 12px;border-radius:20px;border:1px solid transparent;background:transparent;color:var(--text-soft);font-family:'Nunito Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;}
.sc-btn:hover{color:var(--text-mid);background:var(--surface);}
.sc-btn.active{background:var(--primary-light);border-color:var(--primary-border);color:var(--primary);}

/* SCENE CARD */
#sceneCard{margin:10px 12px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;flex-shrink:0;display:flex;gap:10px;align-items:flex-start;box-shadow:var(--sh);}
.scene-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.scene-info h3{font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:var(--primary);margin-bottom:2px;}
.scene-info p{font-size:11px;color:var(--text-mid);line-height:1.5;}
.scene-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;font-family:'Nunito',sans-serif;}
.tag.role{background:var(--primary-light);border:1px solid var(--primary-border);color:var(--primary);}
.tag.spot{background:var(--amber-light);border:1px solid var(--amber-border);color:var(--amber);}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.message{display:flex;flex-direction:column;max-width:90%;animation:popIn .2s ease;}
@keyframes popIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.message.driver{align-self:flex-end;align-items:flex-end;}
.message.passenger{align-self:flex-start;align-items:flex-start;}
.msg-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px;padding:0 4px;}
.driver .msg-label{color:var(--primary);}
.passenger .msg-label{color:var(--accent);}

/* BUBBLES */
.bubble{padding:10px 14px;border-radius:var(--radius);font-size:14px;line-height:1.6;box-shadow:var(--sh);}
.driver .bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px;}
/* EN passenger */
.en-mode .passenger .bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.en-mode .passenger .bubble .main{font-size:15px;margin-bottom:4px;}
.en-mode .passenger .bubble .ja-line{margin-top:5px;padding-top:5px;border-top:1px solid var(--border);font-size:11px;color:var(--text-soft);font-style:italic;}
/* KR passenger */
.kr-mode .passenger .bubble{background:var(--surface);border:1px solid var(--kr-border);color:var(--text);border-bottom-left-radius:4px;}
.kr-mode .passenger .bubble .kor{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:.3px;}
.kr-mode .passenger .bubble .read{font-size:11px;font-weight:700;color:var(--kr);background:var(--kr-light);padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:4px;}
.kr-mode .passenger .bubble .ja{font-size:11px;color:var(--text-mid);font-style:italic;border-top:1px solid var(--border);margin-top:5px;padding-top:5px;}

/* FEEDBACK */
.feedback-box{margin-top:4px;border-radius:12px;padding:8px 13px;font-size:12px;line-height:1.6;max-width:90%;align-self:flex-end;animation:popIn .2s ease .08s both;box-shadow:var(--sh);}
.feedback-box.good{background:var(--green-light);border:1px solid var(--green-border);color:var(--green);}
.feedback-box.fix{background:var(--orange-light);border:1px solid rgba(234,88,12,.2);color:var(--orange);}

/* VOCAB TIP — EN */
.en-mode .vocab-tip{align-self:flex-start;margin-top:2px;background:var(--amber-light);border:1px solid var(--amber-border);border-radius:12px;padding:6px 12px;font-size:12px;color:var(--amber);max-width:90%;animation:popIn .2s ease .12s both;box-shadow:var(--sh);}
/* VOCAB TIP — KR */
.kr-mode .vocab-tip{align-self:flex-start;margin-top:2px;background:var(--purple-light);border:1px solid var(--purple-border);border-radius:12px;padding:7px 12px;font-size:12px;color:var(--purple);max-width:90%;animation:popIn .2s ease .12s both;box-shadow:var(--sh);line-height:1.7;}
.kr-mode .vocab-tip .v-kor{font-size:15px;font-weight:800;letter-spacing:.3px;display:block;}
.kr-mode .vocab-tip .v-read{font-size:11px;opacity:.8;display:block;}
.kr-mode .vocab-tip .v-ja{font-size:11px;font-style:italic;opacity:.85;display:block;}

/* SUGGESTIONS */
.sugg-row{align-self:flex-end;display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;max-width:96%;justify-content:flex-end;animation:popIn .2s ease .15s both;}
/* EN chip */
.en-mode .sugg-chip{background:var(--surface);border:1px solid var(--border);color:var(--text-mid);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:all .15s;box-shadow:var(--sh);}
.en-mode .sugg-chip:hover{border-color:var(--en-border);color:var(--en);background:var(--en-light);transform:translateY(-1px);}
/* KR chip — 3 lines */
.kr-mode .sugg-chip{background:var(--surface);border:1.5px solid var(--border);padding:5px 11px;border-radius:12px;font-size:11px;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:all .15s;box-shadow:var(--sh);text-align:left;}
.kr-mode .sugg-chip:hover{border-color:var(--kr-border);background:var(--kr-light);transform:translateY(-1px);}
.sugg-chip .s-kor{font-size:13px;font-weight:700;color:var(--text);display:block;}
.sugg-chip .s-read{font-size:10px;color:var(--text-soft);display:block;}
.sugg-chip .s-ja{font-size:10px;color:var(--text-soft);font-style:italic;display:block;}

/* TYPING */
.typing-dots{display:flex;gap:5px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px;width:fit-content;box-shadow:var(--sh);}
.dot{width:7px;height:7px;background:var(--text-soft);border-radius:50%;animation:bounce 1.1s infinite;}
.dot:nth-child(2){animation-delay:.18s;}.dot:nth-child(3){animation-delay:.36s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* END CARD */
.end-card{align-self:center;text-align:center;background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--amber);border-radius:var(--radius);padding:16px 22px;margin-top:6px;animation:popIn .3s ease;box-shadow:var(--sh-md);}
.end-card h3{font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;color:var(--amber);margin-bottom:6px;}
.end-card p{font-size:12px;color:var(--text-mid);line-height:1.7;margin-bottom:14px;}
.retry-btn{background:var(--primary);color:#fff;border:none;padding:9px 24px;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;box-shadow:var(--sh);}
.retry-btn:hover{filter:brightness(1.05);transform:translateY(-1px);}

/* WELCOME */
.welcome{text-align:center;padding:18px 16px;animation:popIn .35s ease;}
.welcome .big{font-size:44px;margin-bottom:8px;}
.welcome h2{font-family:'Nunito',sans-serif;font-weight:800;font-size:19px;color:var(--text);margin-bottom:8px;}
.welcome p{font-size:12px;color:var(--text-mid);line-height:1.7;max-width:300px;margin:0 auto 14px;}
.spot-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px;}
.spot-tag{background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:11px;color:var(--text-mid);font-weight:600;box-shadow:var(--sh);}
.start-btn{background:var(--primary);color:#fff;border:none;padding:11px 30px;border-radius:24px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .15s;box-shadow:var(--sh-md);}
.start-btn:hover{filter:brightness(1.06);transform:translateY(-1px);}

/* PHRASE PANEL */
#phrasePanel{background:var(--surface2);border-top:1px solid var(--border);padding:9px 12px;flex-shrink:0;display:none;max-height:130px;overflow-y:auto;}
#phrasePanel.open{display:block;}
.phrase-title{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--primary);text-transform:uppercase;margin-bottom:7px;}
.phrase-grid{display:flex;flex-wrap:wrap;gap:5px;}
.phrase-item{background:var(--surface);border:1px solid var(--border);padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all .15s;font-family:'Nunito Sans',sans-serif;line-height:1.5;}
.phrase-item:hover{border-color:var(--primary-border);color:var(--primary);background:var(--primary-light);}
.phrase-item .pi-sub{font-size:10px;display:block;color:var(--text-soft);}

/* INPUT AREA */
.input-area{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0;box-shadow:0 -1px 4px rgba(0,0,0,.04);}
.input-row{display:flex;gap:6px;align-items:flex-end;}
#userInput{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:9px 13px;color:var(--text);font-family:'Nunito Sans',sans-serif;font-size:14px;resize:none;outline:none;min-height:42px;max-height:88px;line-height:1.5;transition:border-color .15s;}
#userInput:focus{border-color:var(--primary);}
#userInput::placeholder{color:var(--text-soft);font-size:12px;}
.btn-row{display:flex;gap:5px;}
.icon-btn{width:42px;height:42px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text-soft);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;box-shadow:var(--sh);}
.icon-btn:hover{border-color:var(--primary-border);color:var(--primary);background:var(--primary-light);}
.icon-btn.on{background:var(--primary-light);border-color:var(--primary-border);color:var(--primary);}
#micBtn.recording{background:var(--primary);border-color:var(--primary);color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,90,43,.4);}50%{box-shadow:0 0 0 7px rgba(224,90,43,0);}}
#sendBtn{width:42px;height:42px;background:var(--primary);border:none;border-radius:12px;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;box-shadow:var(--sh-md);}
#sendBtn:hover:not(:disabled){filter:brightness(1.07);transform:scale(1.04);}
#sendBtn:disabled{opacity:.35;cursor:default;transform:none;}
.voice-status{font-size:11px;text-align:center;margin-top:5px;min-height:15px;color:var(--text-soft);font-weight:600;}
.voice-status.listening{color:var(--primary);}
.voice-status.speaking{color:var(--accent);}

/* ═══ GUIDE MODE ═══ */
#guideView{flex:1;overflow-y:auto;display:none;flex-direction:column;min-height:0;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
#guideView.active{display:flex;}
.guide-filter{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.guide-filter::-webkit-scrollbar{display:none;}
.cat-btn{white-space:nowrap;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-mid);font-family:'Nunito Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;box-shadow:var(--sh);}
.cat-btn:hover{border-color:var(--teal-border);color:var(--teal);}
.cat-btn.active{background:var(--teal-light);border-color:var(--teal-border);color:var(--teal);}
.spot-cards{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.spot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:all .2s;}
.spot-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px);}
.spot-thumb{height:84px;display:flex;align-items:center;justify-content:center;font-size:38px;}
.spot-card-body{padding:9px 11px 11px;}
.spot-card-name{font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:var(--text);margin-bottom:1px;}
.spot-card-sub{font-size:11px;color:var(--text-soft);margin-bottom:5px;}
.spot-card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.spot-card-tag{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700;font-family:'Nunito',sans-serif;}
.spot-card-desc{font-size:11px;color:var(--text-mid);line-height:1.5;}

/* SPOT DETAIL */
#spotDetail{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;overflow:hidden;}
#spotDetail.open{display:flex;}
.detail-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:var(--sh);}
.back-btn{background:none;border:none;color:var(--primary);font-size:20px;cursor:pointer;padding:2px 6px;font-family:'Nunito',sans-serif;font-weight:700;}
.detail-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;color:var(--text);}
.detail-title-sub{font-size:11px;color:var(--text-soft);}
.detail-body{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.detail-hero{height:130px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:14px;box-shadow:var(--sh);}
.detail-section{margin-bottom:14px;}
.detail-section-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-soft);margin-bottom:7px;}
.detail-section p{font-size:13px;color:var(--text-mid);line-height:1.65;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.info-cell{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 11px;box-shadow:var(--sh);}
.info-cell-label{font-size:10px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.info-cell-value{font-size:12px;font-weight:600;color:var(--text);line-height:1.5;}
.phrase-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;box-shadow:var(--sh);margin-bottom:14px;}
.phrase-block-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:var(--primary);margin-bottom:10px;}
.detail-phrase-row{padding:8px 0;border-bottom:1px solid var(--border);}
.detail-phrase-row:last-child{border-bottom:none;padding-bottom:0;}
.dpr-main{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.dpr-read{display:inline-block;font-size:11px;font-weight:700;color:var(--kr);background:var(--kr-light);padding:1px 8px;border-radius:6px;margin-bottom:3px;}
.dpr-ja{font-size:11px;color:var(--text-mid);font-style:italic;}
.map-placeholder{height:110px;background:var(--teal-light);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:all .15s;margin-bottom:14px;border:1px solid var(--teal-border);}
.map-placeholder:hover{background:#ccf2f8;}
.map-placeholder span{font-size:26px;}
.map-placeholder p{font-size:12px;font-weight:700;color:var(--teal);}
.map-placeholder small{font-size:10px;color:var(--text-soft);}
.practice-link-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .15s;box-shadow:var(--sh-md);margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.practice-link-btn:hover{filter:brightness(1.06);transform:translateY(-1px);}
</style>
</head>
<body>

<header>
  <div class="taxi-badge">TAXI</div>
  <div class="header-text">
    <h1 id="headerTitle">広島タクシー英会話</h1>
    <p id="headerSub">Hiroshima Taxi English Practice</p>
  </div>
  <div id="scoreDisplay">⭐ 0 pts</div>
  <div class="lang-switcher">
    <button class="lang-btn en active" onclick="switchLang('en')">🇬🇧 EN</button>
    <button class="lang-btn kr" onclick="switchLang('kr')">🇰🇷 KR</button>
  </div>
</header>

<div class="mode-bar">
  <button class="mode-btn active" id="modePractice" onclick="switchMode('practice')">🚕 会話練習</button>
  <button class="mode-btn" id="modeGuide" onclick="switchMode('guide')">🗾 観光案内</button>
</div>

<div id="practiceView" style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;">
  <div class="scenario-bar" id="scenarioBar"></div>
  <div id="sceneCard">
    <div class="scene-icon" id="sceneIcon">🚦</div>
    <div class="scene-info">
      <h3 id="sceneTitle"></h3>
      <p id="sceneDesc"></p>
      <div class="scene-tags">
        <span class="tag role" id="driverTag">🚕 あなた＝ドライバー</span>

function getSpots(){ return lang==='en' ? SPOTS_EN : SPOTS_KR; }
function getSC(){ return lang==='en' ? SC_EN : SC_KR; }

// ═══════════════════════════════════════════════
//  LANG SWITCH
// ═══════════════════════════════════════════════
function switchLang(l){
  lang = l;
  document.querySelector('.lang-btn.en').classList.toggle('active', l==='en');
  document.querySelector('.lang-btn.kr').classList.toggle('active', l==='kr');
  // Update CSS mode class on practiceView
  document.getElementById('practiceView').className = l+'-mode';
  document.getElementById('practiceView').style.display = 'flex';
  document.getElementById('practiceView').style.flexDirection = 'column';
  document.getElementById('practiceView').style.flex = '1';
  document.getElementById('practiceView').style.overflow = 'hidden';
  document.getElementById('practiceView').style.minHeight = '0';
  // Update header
  const cfg = LANG_CONFIG[l];
  document.getElementById('headerTitle').textContent = cfg.headerTitle;
  document.getElementById('headerSub').textContent = cfg.headerSub;
  // Update primary/accent colors for KR
  const root = document.documentElement;
  if(l==='kr'){
    root.style.setProperty('--primary','#3b5bdb');
    root.style.setProperty('--primary-light','#eef2ff');
    root.style.setProperty('--primary-border','rgba(59,91,219,0.28)');
    root.style.setProperty('--accent','#e03131');
  } else {
    root.style.setProperty('--primary','#e05a2b');
    root.style.setProperty('--primary-light','#fdf0eb');
    root.style.setProperty('--primary-border','rgba(224,90,43,0.28)');
    root.style.setProperty('--accent','#2b7de0');
  }
  // Rebuild scenario tabs
  buildScenarioTabs();
  // Update welcome
  updateWelcome();
  // Reset practice
  resetPractice();
}

function buildScenarioTabs(){
  const SC = getSC();
  const bar = document.getElementById('scenarioBar');
  bar.innerHTML = Object.entries(SC).map(([k,v],i)=>
    `<button class="sc-btn${i===0?' active':''}" data-sc="${k}">${v.icon} ${v.title.length>8?v.title.slice(0,8)+'…':v.title}</button>`
  ).join('');
  document.querySelectorAll('.sc-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.sc-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      cur=b.dataset.sc; turn=0; score=0;
      chat.innerHTML='';
      document.getElementById('scoreDisplay').textContent='⭐ 0 pts';
      const sc=getSC()[cur];
      document.getElementById('sceneIcon').textContent=sc.icon;
      document.getElementById('sceneTitle').textContent=sc.title;
      document.getElementById('sceneDesc').textContent=sc.desc;
      document.getElementById('spotTag').textContent=sc.spot;
      if(phraseOpen){phraseOpen=false;document.getElementById('phrasePanel').classList.remove('open');document.getElementById('phraseBtn').classList.remove('on');}
      startScenario();
    });
  });
  // Set initial cur
  cur = Object.keys(SC)[0];
  const sc=SC[cur];
  document.getElementById('sceneIcon').textContent=sc.icon;
  document.getElementById('sceneTitle').textContent=sc.title;
  document.getElementById('sceneDesc').textContent=sc.desc;
  document.getElementById('spotTag').textContent=sc.spot;
}

function updateWelcome(){
  const cfg = LANG_CONFIG[lang];
  document.getElementById('welcomeEmoji').textContent = cfg.welcomeEmoji;
  document.getElementById('welcomeTitle').textContent = cfg.welcomeTitle;
  document.getElementById('welcomeDesc').textContent = cfg.welcomeDesc;
  const grid = document.getElementById('welcomeGrid');
  grid.innerHTML = cfg.welcomeTags.map(t=>`<span class="spot-tag">${t}</span>`).join('');
}

// ═══════════════════════════════════════════════
//  MODE SWITCH
// ═══════════════════════════════════════════════
function switchMode(mode){
  const pv = document.getElementById('practiceView');
  pv.style.display = mode==='practice'?'flex':'none';
  document.getElementById('guideView').classList.toggle('active', mode==='guide');
  document.getElementById('modePractice').classList.toggle('active', mode==='practice');
  document.getElementById('modeGuide').classList.toggle('active', mode==='guide');
  if(mode==='guide'){
    const activeCat=document.querySelector('.cat-btn.active')?.dataset.cat||'all';
    renderGuide(activeCat);
  }
}

// ═══════════════════════════════════════════════
//  GUIDE
// ═══════════════════════════════════════════════
function renderGuide(cat){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  const spots = getSpots();
  const filtered = cat==='all'?spots:spots.filter(s=>s.cat===cat);
  document.getElementById('spotCards').innerHTML = filtered.map(s=>{
    const cc=CAT_COLORS[s.cat];
    return `<div class="spot-card" onclick="openDetail('${s.id}')">
      <div class="spot-thumb" style="background:${s.bg}">${s.emoji}</div>
      <div class="spot-card-body">
        <div class="spot-card-name">${s.name}</div>
        <div class="spot-card-sub">${s.sub||''}</div>
        <div class="spot-card-tags">
          <span class="spot-card-tag" style="background:${cc.bg};color:${cc.color}">${cc.label}</span>
        </div>
        <div class="spot-card-desc">${s.desc.length>55?s.desc.slice(0,55)+'…':s.desc}</div>
      </div>
    </div>`;
  }).join('');
}
document.querySelectorAll('.cat-btn').forEach(b=>b.addEventListener('click',()=>renderGuide(b.dataset.cat)));

function openDetail(id){
  const spots = getSpots();
  const s = spots.find(x=>x.id===id); if(!s)return;
  document.getElementById('detailTitle').textContent=s.name;
  document.getElementById('detailSub').textContent=s.sub||'';
  const mapUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.mapQ)}`;
  const phrasesHtml = s.phrases.map(p=>{
    if(lang==='kr'){
      return `<div class="detail-phrase-row">
        <div class="dpr-main">${p.main}</div>
        <span class="dpr-read">${p.read}</span>
        <div class="dpr-ja">${p.ja}</div>
      </div>`;
    } else {
      return `<div class="detail-phrase-row">
        <div class="dpr-main" style="color:var(--en)">${p.main}</div>
      </div>`;
    }
  }).join('');
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-hero" style="background:${s.bg}">${s.emoji}</div>
    <div class="detail-section"><div class="detail-section-title">📖 概要</div><p>${s.desc}</p></div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-cell-label">🕐 営業時間</div><div class="info-cell-value">${s.hours}</div></div>
      <div class="info-cell"><div class="info-cell-label">💴 料金</div><div class="info-cell-value">${s.fee}</div></div>
      <div class="info-cell" style="grid-column:1/-1"><div class="info-cell-label">🚃 アクセス</div><div class="info-cell-value">${s.access}</div></div>
    </div>
    <div class="map-placeholder" onclick="window.open('${mapUrl}','_blank')">
      <span>🗺️</span><p>Google マップで開く</p><small>${s.name}</small>
    </div>
    <div class="phrase-block">
      <div class="phrase-block-title">🗣️ ${lang==='kr'?'韓国語':'英語'}タクシーフレーズ</div>
      ${phrasesHtml}
    </div>
    <button class="practice-link-btn" onclick="goToPractice('${s.linked}')">
      🚕 このスポットのシナリオで練習する
    </button>`;
  document.getElementById('spotDetail').classList.add('open');
}
function closeDetail(){document.getElementById('spotDetail').classList.remove('open');}
function goToPractice(scId){
  closeDetail();
  switchMode('practice');
  document.querySelectorAll('.sc-btn').forEach(b=>{if(b.dataset.sc===scId)b.click();});
}

// ═══════════════════════════════════════════════
//  PRACTICE STATE
// ═══════════════════════════════════════════════
let cur='peace', turn=0, score=0, phraseOpen=false, busy=false;
const chat=document.getElementById('chat');
const input=document.getElementById('userInput');
const sendBtn=document.getElementById('sendBtn');

function resetPractice(){
  turn=0; score=0;
  chat.innerHTML='';
  document.getElementById('scoreDisplay').textContent='⭐ 0 pts';
  // Re-add welcome
  const w=document.createElement('div');
  w.className='welcome'; w.id='welcome';
  const cfg=LANG_CONFIG[lang];
  w.innerHTML=`<div class="big">${cfg.welcomeEmoji}</div><h2>${cfg.welcomeTitle}</h2>
    <p>${cfg.welcomeDesc.replace('\n','<br>')}</p>
    <div class="spot-grid">${cfg.welcomeTags.map(t=>`<span class="spot-tag">${t}</span>`).join('')}</div>
    <button class="start-btn" onclick="startScenario()">▶ 乗客を乗せる</button>`;
  chat.appendChild(w);
}

function startScenario(){
  removeWelcome(); turn=0; busy=false;
  setTimeout(()=>showPassengerLine(getSC()[cur].turns[0]),400);
}

function showPassengerLine(t){
  const typ=addTyping(); busy=true; sendBtn.disabled=true;
  setTimeout(()=>{
    typ.remove();
    if(lang==='kr') addPMsgKR(t.p,t.read,t.ja);
    else addPMsgEN(t.p,t.ja);
    addSuggs(t.sugg);
    busy=false; sendBtn.disabled=false; input.focus();
  },800);
}

function handleSend(){
  const text=input.value.trim();
  if(!text||busy)return;
  removeWelcome();
  input.value=''; input.style.height='auto';
  sendBtn.disabled=true;
  addDMsg(text);
  const t=getSC()[cur].turns[turn];
  const lower=text.toLowerCase();
  const ok=t.kw.some(k=>lower.includes(k));
  score+=ok?10:3;
  document.getElementById('scoreDisplay').textContent=`⭐ ${score} pts`;
  setTimeout(()=>{
    addFB(ok?t.good:t.fix+'\n（あなたの返答も伝わります👍）',ok);
    if(t.vocab) addVT(t.vocab);
    turn++;
    if(turn<getSC()[cur].turns.length){
      setTimeout(()=>showPassengerLine(getSC()[cur].turns[turn]),600);
    } else {
      setTimeout(()=>{
        const e=document.createElement('div');
        e.className='end-card';
        const fin=lang==='kr'?'수고했어요！':'Well done!';
        e.innerHTML=`<h3>🎉 シナリオ完了！ ${fin}</h3><p>「${getSC()[cur].title}」を完走しました！<br>獲得ポイント: ⭐ ${score} pts</p><button class="retry-btn" onclick="retryScenario()">🔄 もう一度</button>`;
        chat.appendChild(e); scroll();
      },700);
    }
  },350);
}

function retryScenario(){turn=0;score=0;document.getElementById('scoreDisplay').textContent='⭐ 0 pts';chat.innerHTML='';startScenario();}

function togglePhrase(){
  phraseOpen=!phraseOpen;
  document.getElementById('phrasePanel').classList.toggle('open',phraseOpen);
  document.getElementById('phraseBtn').classList.toggle('on',phraseOpen);
  if(phraseOpen){
    const SC=getSC(); const grid=document.getElementById('phraseGrid');
    grid.innerHTML=SC[cur].phrases.map(p=>{
      const subHtml=p.sub?`<span class="pi-sub">${p.sub}</span>`:'';
      return `<button class="phrase-item" onclick="inp(${JSON.stringify(p.main)})">${p.main}${subHtml}</button>`;
    }).join('');
  }
}
function inp(p){input.value=p;input.focus();}

// ── DOM Helpers ──────────────────────────────
function addDMsg(text){
  const e=document.createElement('div');
  e.className='message driver';
  e.innerHTML=`<div class="msg-label">${LANG_CONFIG[lang].driverLabel}</div><div class="bubble">${esc(text)}</div>`;
  chat.appendChild(e); scroll();
}
function addPMsgEN(main,ja){
  const e=document.createElement('div');
  e.className='message passenger';
  e.innerHTML=`<div class="msg-label">${LANG_CONFIG[lang].passengerLabel}</div>
    <div class="bubble">
      <div class="main">${esc(main)}</div>
      ${ja?`<div class="ja-line">🇯🇵 ${esc(ja)}</div>`:''}
    </div>`;
  chat.appendChild(e); scroll(); speak(main);
}
function addPMsgKR(kor,read,ja){
  const e=document.createElement('div');
  e.className='message passenger';
  e.innerHTML=`<div class="msg-label">${LANG_CONFIG[lang].passengerLabel}</div>
    <div class="bubble">
      <div class="kor">${esc(kor)}</div>
      <span class="read">${esc(read)}</span>
      <div class="ja">🇯🇵 ${esc(ja)}</div>
    </div>`;
  chat.appendChild(e); scroll(); speak(kor);
}
function addFB(t,good){
  const e=document.createElement('div');
  e.className=`feedback-box ${good?'good':'fix'}`;
  e.innerHTML=esc(t).replace(/\n/g,'<br>');
  chat.appendChild(e); scroll();
}
function addVT(v){
  const e=document.createElement('div');
  e.className='vocab-tip';
  if(lang==='kr' && typeof v==='object'){
    e.innerHTML=`💡 <span class="v-kor">${esc(v.kor)}</span> <span class="v-read">${esc(v.read)}</span><div class="v-ja">${esc(v.ja)}</div>`;
  } else {
    e.textContent='💡 '+(typeof v==='string'?v:v.kor||'');
  }
  chat.appendChild(e); scroll();
}
function addSuggs(arr){
  if(!arr?.length)return;
  const r=document.createElement('div'); r.className='sugg-row';
  arr.forEach(s=>{
    const b=document.createElement('button'); b.className='sugg-chip';
    if(lang==='kr'){
      b.innerHTML=`<span class="s-kor">${esc(s.kor)}</span><span class="s-read">${esc(s.read)}</span><span class="s-ja">${esc(s.ja)}</span>`;
      b.onclick=()=>{input.value=s.kor;input.focus();};
    } else {
      b.textContent=s.main||s;
      b.onclick=()=>{input.value=s.main||s;input.focus();};
    }
    r.appendChild(b);
  });
  chat.appendChild(r); scroll();
}
function addTyping(){
  const w=document.createElement('div');
  w.className='message passenger';
  w.innerHTML=`<div class="msg-label">${LANG_CONFIG[lang].passengerLabel}</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(w); scroll(); return w;
}
function removeWelcome(){document.getElementById('welcome')?.remove();}
function scroll(){chat.scrollTop=chat.scrollHeight;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ═══════════════════════════════════════════════
//  VOICE
// ═══════════════════════════════════════════════
let voiceOn=true, micActive=false, recog=null;
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

function speak(text){
  if(!voiceOn)return;
  if(micActive){stopMic();}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=LANG_CONFIG[lang].voiceLang; u.rate=0.88; u.pitch=1.0;
  const voices=speechSynthesis.getVoices();
  const vl=LANG_CONFIG[lang].voiceLang;
  const pref=voices.find(v=>v.lang===vl)||voices.find(v=>v.lang.startsWith(vl.split('-')[0]));
  if(pref)u.voice=pref;
  setVoiceStatus(lang==='kr'?'🔊 韓国語を読み上げ中...':'🔊 Speaking...','speaking');
  u.onend=()=>setVoiceStatus('');
  u.onerror=()=>setVoiceStatus('');
  speechSynthesis.speak(u);
}

function toggleMic(){
  if(!SpeechRecognition){setVoiceStatus('⚠️ Chrome/Edgeでご利用ください');return;}
  if(micActive){stopMic();return;}
  recog=new SpeechRecognition();
  recog.lang=LANG_CONFIG[lang].micLang;
  recog.interimResults=true; recog.continuous=false;
  recog.onstart=()=>{micActive=true;document.getElementById('micBtn').classList.add('recording');setVoiceStatus(lang==='kr'?'🎤 韓国語で話してください...':'🎤 Speak now in English...','listening');};
  recog.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    input.value=final||interim;
    input.style.height='auto';
    input.style.height=Math.min(input.scrollHeight,88)+'px';
  };
  recog.onspeechend=()=>recog.stop();
  recog.onnomatch=()=>recog.stop();
  recog.onend=()=>{
    micActive=false; document.getElementById('micBtn').classList.remove('recording'); setVoiceStatus('');
    if(input.value.trim()){
      if(!busy){setTimeout(handleSend,300);}
      else{const saved=input.value;const retry=setInterval(()=>{if(!busy){clearInterval(retry);if(!input.value.trim())input.value=saved;setTimeout(handleSend,100);}},200);setTimeout(()=>clearInterval(retry),1500);}
    }
  };
  recog.onerror=(e)=>{micActive=false;document.getElementById('micBtn').classList.remove('recording');setVoiceStatus(e.error==='not-allowed'?'⚠️ マイクの許可が必要です':'⚠️ Error: '+e.error);};
  recog.start();
  setTimeout(()=>{if(micActive)recog.stop();},8000);
}
function stopMic(){if(recog){recog.stop();recog=null;}}
function toggleVoice(){
  voiceOn=!voiceOn;
  const btn=document.getElementById('voiceToggle');
  btn.classList.toggle('on',voiceOn); btn.textContent=voiceOn?'🔊':'🔇';
  if(!voiceOn)window.speechSynthesis.cancel();
  setVoiceStatus(voiceOn?'🔊 読み上げ: ON':'🔇 読み上げ: OFF');
  setTimeout(()=>setVoiceStatus(''),1500);
}
function setVoiceStatus(msg,cls=''){const el=document.getElementById('voiceStatus');el.textContent=msg;el.className='voice-status'+(cls?' '+cls:'');}
speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

document.getElementById('practiceView').className='en-mode';
document.getElementById('practiceView').style.cssText='display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;';
buildScenarioTabs();
updateWelcome();
